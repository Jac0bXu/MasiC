name: AND2
yosys_types: ["$_AND_"]
family: combinational
# Schematic spans y=-1..0; the manifest is normalized so y=0 is the floor.
footprint: [5, 2, 3]
ports:
  inputs:
    A: {coord: [0, 1, 0], kind: lever}
    B: {coord: [0, 1, 2], kind: lever}
  outputs:
    Y: {coord: [4, 1, 1], kind: lamp}
delay_ticks: 3
power_emitters:
  - [2, 1, 0]    # wall_torch
  - [2, 1, 1]    # wall_torch
  - [2, 1, 2]    # wall_torch
  - [3, 1, 1]    # comparator output
truth_table:
  - {A: 0, B: 0, Y: 0}
  - {A: 0, B: 1, Y: 0}
  - {A: 1, B: 0, Y: 0}
  - {A: 1, B: 1, Y: 1}
