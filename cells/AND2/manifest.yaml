name: AND2
yosys_types: ["$_AND_"]
family: combinational
footprint: [4, 2, 5]
ports:
  inputs:
    A: {coord: [0, 0, 0], kind: lever}
    B: {coord: [0, 0, 4], kind: lever}
  outputs:
    Y: {coord: [3, 0, 2], kind: lamp}
delay_ticks: 3
truth_table:
  - {A: 0, B: 0, Y: 0}
  - {A: 0, B: 1, Y: 0}
  - {A: 1, B: 0, Y: 0}
  - {A: 1, B: 1, Y: 1}
