name: OR2
yosys_types: ["$_OR_"]
family: combinational
# Schematic spans y=-1..0; the manifest is normalized so y=0 is the floor.
footprint: [5, 2, 2]
ports:
  inputs:
    A: {coord: [0, 1, 0], kind: lever}
    B: {coord: [0, 1, 1], kind: lever}
  outputs:
    Y: {coord: [4, 1, 0], kind: lamp}
delay_ticks: 1
truth_table:
  - {A: 0, B: 0, Y: 0}
  - {A: 0, B: 1, Y: 1}
  - {A: 1, B: 0, Y: 1}
  - {A: 1, B: 1, Y: 1}
